<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorveteria Gelato - Sistema de Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-container { display: none; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; left: 0; top: 0; transition: all 0.3s; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .sidebar-header h2 { font-size: 28px; font-weight: 700; }
        .menu { padding: 20px; }
        .menu-item { padding: 12px 20px; margin: 8px 0; border-radius: 12px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        
        .logout-btn { position: absolute; bottom: 30px; left: 20px; right: 20px; padding: 12px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; }
        .main-content { margin-left: 280px; padding: 30px; min-height: 100vh; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: fadeInUp 0.5s ease; }
        .stat-card .value { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-card, .table-container, .dashboard-header { background: white; padding: 25px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 10px; font-family: inherit; }

        .btn-primary { background: #667eea; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #f5576c; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .btn-secondary { background: #fa709a; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }

        .auth-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: white; border-radius: 25px; width: 100%; max-width: 400px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .auth-header { background: #667eea; color: white; padding: 30px; text-align: center; }
        .auth-form { padding: 30px; }

        .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: none; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; }
        .loading { width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>🍦 Gelato</h1>
                <p>Sistema de Gestão</p>
            </div>
            <div class="auth-form">
                <div id="loginAlert" class="alert alert-error"></div>
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="loginUsername" placeholder="Seu usuário" value="joao">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="Sua senha" value="joao123">
                </div>
                <button class="btn-primary" style="width: 100%;" id="loginBtnAction">Entrar</button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🍦 Gelato</h2>
            </div>
            <div class="menu">
                <div class="menu-item active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> Dashboard</div>
                <div class="menu-item" onclick="showSection('sabores')"><i class="fas fa-ice-cream"></i> Sabores</div>
                <div class="menu-item" onclick="showSection('reservas')"><i class="fas fa-calendar"></i> Reservas</div>
                <div class="menu-item" onclick="showSection('funcionarios')"><i class="fas fa-users"></i> Funcionários</div>
                <div class="menu-item" onclick="showSection('carrinho')"><i class="fas fa-shopping-cart"></i> Vendas</div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Olá, <span id="userName">...</span>!</h1>
                <div id="userRoleBadge" style="margin-top: 5px;"></div>
            </div>

            <div id="dashboardSection" class="content-section active">
                <div class="stats-grid">
                    <div class="stat-card"><h3>Sabores</h3><div class="value" id="statSabores">0</div></div>
                    <div class="stat-card"><h3>Funcionários</h3><div class="value" id="statFunc">0</div></div>
                    <div class="stat-card"><h3>Vendas</h3><div class="value" id="statVendas">R$ 0</div></div>
                </div>
            </div>

            <div id="saboresSection" class="content-section">
                <div class="form-card" id="adminSaborForm" style="display:none">
                    <h3>Novo Sabor</h3>
                    <div class="form-row">
                        <input type="text" id="sNome" placeholder="Nome">
                        <input type="number" id="sPreco" placeholder="Preço" step="0.01">
                        <input type="number" id="sQtd" placeholder="Estoque">
                    </div>
                    <button class="btn-primary" onclick="addSabor()">Salvar</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Nome</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead>
                        <tbody id="listaSabores"></tbody>
                    </table>
                </div>
            </div>

            <div id="funcionariosSection" class="content-section">
                <div id="adminFuncContent">
                     <p>Acesso restrito.</p>
                </div>
            </div>

            <div id="carrinhoSection" class="content-section">
                <div class="form-card">
                    <div class="form-row">
                        <select id="selSabor"></select>
                        <input type="number" id="selQtd" value="1" min="1">
                        <button class="btn-primary" onclick="addToCart()">Adicionar</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="cartTable">
                        <thead><tr><th>Item</th><th>Qtd</th><th>Total</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    <div style="margin-top:20px; text-align:right">
                        <h3>Total: R$ <span id="cartTotal">0.00</span></h3>
                        <button class="btn-primary" onclick="checkout()">Finalizar</button>
                    </div>
                </div>
            </div>
            
            <div id="reservasSection" class="content-section">
                <div class="form-card">
                    <div class="form-row">
                        <input type="date" id="resData">
                        <input type="time" id="resHora">
                        <input type="number" id="resPessoas" placeholder="Pessoas">
                    </div>
                    <button class="btn-primary" onclick="addReserva()">Reservar</button>
                </div>
                <div class="table-container">
                    <table id="resTable">
                        <thead><tr><th>Data</th><th>Hora</th><th>Pessoas</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kyrlxzgjinjyastehmpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5cmx4emdqaW5qeWFzdGVobXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTE0MzUsImV4cCI6MjA5MDU4NzQzNX0.YIrQUgnPK7Fk4WhfUg0xehLkLUHaNgExJ7P5CbsQwng';
        
        // CORREÇÃO: Nome da constante alterado para evitar conflito com a classe global do Supabase
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSession = null;
        let cart = [];

        // --- AUTH ---
        async function handleLogin() {
            const user = document.getElementById('loginUsername').value.toLowerCase().trim();
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtnAction');
            const alertBox = document.getElementById('loginAlert');

            if(!user || !pass) return;

            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;
            alertBox.style.display = 'none';

            try {
                const { data, error } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('username', user)
                    .eq('password', pass)
                    .single();

                if (error || !data) {
                    throw new Error('Usuário ou senha incorretos');
                }

                userSession = data;
                localStorage.setItem('gelato_user', JSON.stringify(data));
                startApp();
            } catch (err) {
                alertBox.textContent = err.message;
                alertBox.style.display = 'block';
            } finally {
                btn.innerHTML = 'Entrar';
                btn.disabled = false;
            }
        }

        function startApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('userName').textContent = userSession.nome;
            document.getElementById('userRoleBadge').innerHTML = `<span class="badge badge-success">${userSession.role.toUpperCase()}</span>`;
            
            if(userSession.role === 'admin') {
                document.getElementById('adminSaborForm').style.display = 'block';
                loadAdminStaff();
            }
            
            loadData();
        }

        function logout() {
            localStorage.removeItem('gelato_user');
            location.reload();
        }

        // --- DATA LOADING ---
        async function loadData() {
            loadStats();
            loadSabores();
            loadReservas();
        }

        async function loadStats() {
            const { count: s } = await _supabase.from('sabores').select('*', { count: 'exact', head: true });
            const { count: f } = await _supabase.from('users').select('*', { count: 'exact', head: true });
            const { data: v } = await _supabase.from('vendas').select('total');
            
            document.getElementById('statSabores').textContent = s || 0;
            document.getElementById('statFunc').textContent = f || 0;
            const total = v?.reduce((acc, curr) => acc + parseFloat(curr.total), 0) || 0;
            document.getElementById('statVendas').textContent = `R$ ${total.toFixed(2)}`;
        }

        async function loadSabores() {
            const { data } = await _supabase.from('sabores').select('*').order('nome');
            const tbody = document.getElementById('listaSabores');
            const select = document.getElementById('selSabor');
            
            tbody.innerHTML = '';
            select.innerHTML = '<option value="">Selecione...</option>';

            data?.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.nome}</td>
                        <td>R$ ${item.preco.toFixed(2)}</td>
                        <td><span class="badge ${item.quantidade < 5 ? 'badge-warning' : ''}">${item.quantidade}</span></td>
                        <td>${userSession.role === 'admin' ? `<button class="btn-danger" onclick="deleteSabor(${item.id})">Apagar</button>` : '-'}</td>
                    </tr>
                `;
                if(item.quantidade > 0) {
                    select.innerHTML += `<option value="${item.id}" data-preco="${item.preco}" data-nome="${item.nome}">${item.nome}</option>`;
                }
            });
        }

        // --- ACTIONS ---
        async function addSabor() {
            const nome = document.getElementById('sNome').value;
            const preco = document.getElementById('sPreco').value;
            const qtd = document.getElementById('sQtd').value;

            const { error } = await _supabase.from('sabores').insert([{ nome, preco, quantidade: qtd }]);
            if(!error) {
                alert('Sabor adicionado!');
                loadData();
            }
        }

        function addToCart() {
            const sel = document.getElementById('selSabor');
            const opt = sel.options[sel.selectedIndex];
            if(!sel.value) return;

            const item = {
                id: sel.value,
                nome: opt.dataset.nome,
                preco: parseFloat(opt.dataset.preco),
                qtd: parseInt(document.getElementById('selQtd').value)
            };

            cart.push(item);
            updateCartTable();
        }

        function updateCartTable() {
            const tbody = document.querySelector('#cartTable tbody');
            let total = 0;
            tbody.innerHTML = '';
            cart.forEach(i => {
                const sub = i.preco * i.qtd;
                total += sub;
                tbody.innerHTML += `<tr><td>${i.nome}</td><td>${i.qtd}</td><td>R$ ${sub.toFixed(2)}</td></tr>`;
            });
            document.getElementById('cartTotal').textContent = total.toFixed(2);
        }

        async function checkout() {
            if(cart.length === 0) return;
            const total = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            
            const { error } = await _supabase.from('vendas').insert([{
                user_id: userSession.id,
                user_name: userSession.nome,
                total: total,
                produtos: cart
            }]);

            if(!error) {
                alert('Venda realizada!');
                cart = [];
                updateCartTable();
                loadData();
            }
        }

        async function addReserva() {
            const { error } = await _supabase.from('reservas').insert([{
                user_id: userSession.id,
                data: document.getElementById('resData').value,
                horario: document.getElementById('resHora').value,
                pessoas: document.getElementById('resPessoas').value,
                status: 'confirmado'
            }]);
            if(!error) { alert('Reservado!'); loadReservas(); }
        }

        async function loadReservas() {
            const { data } = await _supabase.from('reservas').select('*');
            const tbody = document.querySelector('#resTable tbody');
            tbody.innerHTML = '';
            data?.forEach(r => {
                tbody.innerHTML += `<tr><td>${r.data}</td><td>${r.horario}</td><td>${r.pessoas}</td></tr>`;
            });
        }

        async function loadAdminStaff() {
            const { data } = await _supabase.from('users').select('*');
            const div = document.getElementById('adminFuncContent');
            let html = '<table><thead><tr><th>Nome</th><th>Cargo</th></tr></thead><tbody>';
            data?.forEach(u => {
                html += `<tr><td>${u.nome}</td><td>${u.role}</td></tr>`;
            });
            html += '</tbody></table>';
            div.innerHTML = html;
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + 'Section').classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // --- INIT ---
        window.onload = () => {
            document.getElementById('loginBtnAction').onclick = handleLogin;
            const saved = localStorage.getItem('gelato_user');
            if(saved) {
                userSession = JSON.parse(saved);
                startApp();
            }
        };
    </script>
</body>
</html>
